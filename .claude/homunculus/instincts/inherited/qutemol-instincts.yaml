# Qutemol Workflow Update Build System And Ci

## Action

Follow the update-build-system-and-ci workflow:
1. Modify CMakeLists.txt to update build instructions or dependencies.
2. Update .github/workflows/cmake-multi-platform.yml to reflect changes in build requirements or CI steps.
3. Test CI to ensure builds succeed on all platforms.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: CMakeLists.txt, .github/workflows/cmake-multi-platform.yml

