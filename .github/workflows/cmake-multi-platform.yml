name: CMake on multiple platforms

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libwxgtk3.2-dev libglew-dev libpng-dev libgif-dev zlib1g-dev libeigen3-dev libglu1-mesa-dev

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        vcpkg install wxwidgets glew libpng freeglut zlib giflib eigen3

    - name: Clone vcglib
      run: |
        git clone --depth 1 https://github.com/cnr-isti-vclab/vcglib.git vcg

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      shell: bash
      run: |
        TOOLCHAIN_ARG=""
        if [ "${{ runner.os }}" == "Windows" ]; then
          TOOLCHAIN_ARG="-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake"
        fi
        cmake -B ${{ steps.strings.outputs.build-output-dir }}         -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}         -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}         -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}         -DVCG_PATH=${{ github.workspace }}/vcg         $TOOLCHAIN_ARG         -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}
